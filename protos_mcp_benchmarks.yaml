version: 1
notes: Curated benchmark scenarios for Protos MCP agents grouped by difficulty. References
  follow repo-relative paths with optional line hints.
categories:
  easy:
  - id: E01
    title: Sequence Workflow Warmup
    reference: protos/test_sequence_workflow.py:1
    capability: SequenceProcessor ingestion
    description: Load the demo FASTA files, register them through SequenceLoader,
      and confirm the new dataset and entity show up in the registry before exporting
      the dataset back to disk as FASTA and reporting the output paths.
  - id: E02
    title: Pairwise Alignment Preview
    reference: protos/test_sequence_alignment.py:1
    capability: Sequence alignment
    description: Given two demo sequences, run the SequenceProcessor alignment utilities
      to compute the similarity score and show the first few alignment rows so an
      analyst can judge whether the sequences plausibly match.
  - id: E03
    title: Mutant Library Conservation Snapshot
    reference: protos/test_sequence_workflow.py:1
    capability: Sequence analytics
    description: Construct the small mutant library from the example workflow, compute
      the conservation statistics, and print the leading positions with consensus
      data so downstream tools can see which residues stayed stable.
  - id: E04
    title: Structure Data Root Bootstrapping
    reference: protos/test_structure_alignment.py:1
    capability: StructureProcessor setup
    description: Initialize StructureProcessor so that the data root and required
      subdirectories exist, then echo the resolved paths to prove the structure workspace
      was prepared correctly.
  - id: E05
    title: Structure Cache Availability Check
    reference: protos/test_structure_alignment.py:1
    capability: Structure dataset introspection
    description: Inspect the GPCR structure dataset membership and note which PDB
      IDs are already cached locally, flagging any missing files so an agent knows
      whether downloads are required before alignment.
  - id: E06
    title: Load Structure Entity
    reference: protos/test_structure_alignment.py:1
    capability: Structure entity IO
    description: Load one of the cached structures into a dataframe, report the chain
      identifiers and number of residues, and confirm that the returned frame contains
      coordinate columns.
  - id: E07
    title: Loader Coverage Summary
    reference: protos/examples/test_loader_functionality.py:1
    capability: Loader diagnostics
    description: Query the CCD and QM9 loaders for their known datasets, list which
      caches exist, and highlight any missing prerequisite archives so tool invocations
      can be planned.
  - id: E08
    title: Database Download Ledger
    reference: protos/examples/test_database_status.py:1
    capability: Dataset bookkeeping
    description: Produce a concise table of database names, download flags, and storage
      locations to help an agent decide whether further downloads or syncs are necessary.
  - id: E09
    title: Format Configuration Validation
    reference: protos/examples/test_format_validation.py:1
    capability: Format validation
    description: Run the format validation helper on the bundled sample inputs and
      surface any schema mismatches or missing fields so ingest steps can be corrected
      quickly.
  - id: E10
    title: CIF Export Default Verification
    reference: protos/examples/test_cif_default.py:1
    capability: Ligand conversion default
    description: Request a ligand export without specifying a format, verify that
      the exporter chose CIF, and describe where the file was written for later inspection.
  - id: E11
    title: Gzipped CCD Sanity Check
    reference: protos/examples/test_gemmi_gz.py:1
    capability: Compressed structure IO
    description: Open the gzipped CCD archive through Gemmi, stream a handful of lines,
